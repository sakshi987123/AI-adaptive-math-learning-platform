<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson 2 - Introduction to Pythagorean Theorem</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0a0917;--card:#13112a;--card2:#1c1938;--accent:#a78bfa;--accent2:#f59e0b;--accent3:#34d399;--accent4:#f87171;--text:#f0eeff;--muted:#9b96c4;--border:#2e2a54;--lesson-color:#f59e0b;}
  body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
  .outer{width:100%;max-width:780px}
  .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .lesson-label{font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--lesson-color);background:rgba(245,158,11,.12);border:1.5px solid var(--lesson-color);border-radius:50px;padding:4px 14px}
  .lesson-nav-links{display:flex;gap:8px}
  .nav-link{font-size:12px;font-weight:700;color:var(--muted);text-decoration:none;padding:4px 10px;border-radius:50px;border:1.5px solid var(--border);transition:all .2s}
  .nav-link:hover{color:var(--accent);border-color:var(--accent)}
  .nav-link.current{color:var(--lesson-color);border-color:var(--lesson-color)}
  h1{font-size:clamp(20px,4vw,28px);font-weight:900;line-height:1.2;margin-bottom:4px}
  .subtitle{color:var(--muted);font-size:14px;margin-bottom:16px}
  .stage{background:var(--card);border-radius:24px;border:1.5px solid var(--border);overflow:hidden;position:relative}
  .timeline{height:4px;background:var(--border);position:relative}
  .timeline-fill{height:100%;background:linear-gradient(90deg,var(--lesson-color),var(--accent));border-radius:0;transition:width .1s linear;width:0%}
  .step-indicators{display:flex;gap:0;border-bottom:1.5px solid var(--border)}
  .step-tab{flex:1;padding:8px 4px;text-align:center;font-size:11px;font-weight:800;color:var(--muted);border-right:1px solid var(--border);cursor:pointer;transition:all .3s;letter-spacing:.04em}
  .step-tab:last-child{border-right:none}
  .step-tab.active{color:var(--lesson-color);background:rgba(245,158,11,.1)}
  .step-tab.done{color:var(--accent3)}
  .content-area{display:grid;grid-template-columns:1fr 1fr;min-height:380px}
  @media(max-width:600px){.content-area{grid-template-columns:1fr;min-height:auto}}
  .visual-panel{padding:28px 20px;display:flex;align-items:center;justify-content:center;border-right:1.5px solid var(--border);position:relative;background:var(--card2)}
  @media(max-width:600px){.visual-panel{border-right:none;border-bottom:1.5px solid var(--border)}}
  .sign-panel{padding:20px;display:flex;flex-direction:column;justify-content:center;gap:14px}
  .caption{font-size:15px;line-height:1.8;color:var(--text)}
  .sign-block{background:rgba(245,158,11,.07);border:1.5px solid rgba(245,158,11,.3);border-radius:16px;padding:14px;display:flex;flex-direction:column;gap:10px}
  .sign-title{font-size:11px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--lesson-color);display:flex;align-items:center;gap:6px}
  .sign-illustration{display:flex;align-items:center;gap:10px}
  .hand-emoji{font-size:32px;line-height:1;filter:drop-shadow(0 2px 8px rgba(245,158,11,.4))}
  .sign-text{font-size:13px;font-weight:700;color:var(--text);line-height:1.5}
  .sign-instruction{font-size:12px;color:var(--muted);line-height:1.5;border-top:1px solid var(--border);padding-top:8px;margin-top:2px}
  .controls{padding:14px 20px;border-top:1.5px solid var(--border);display:flex;align-items:center;gap:12px;background:rgba(0,0,0,.2)}
  .btn{padding:9px 20px;border-radius:50px;border:none;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer;transition:all .25s;display:inline-flex;align-items:center;gap:6px}
  .btn-play{background:var(--lesson-color);color:#0a0917;min-width:88px}
  .btn-play:hover{filter:brightness(1.15)}
  .btn-outline{background:transparent;border:2px solid var(--border);color:var(--muted)}
  .btn-outline:hover{border-color:var(--lesson-color);color:var(--lesson-color)}
  .speed-label{font-size:12px;color:var(--muted);font-weight:700;margin-left:auto}
  .speed-btn{background:transparent;border:1.5px solid var(--border);color:var(--muted);font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;padding:4px 10px;border-radius:50px;cursor:pointer;transition:all .2s}
  .speed-btn.active{border-color:var(--lesson-color);color:var(--lesson-color)}
  .quiz-area{padding:28px;animation:fadeIn .6s ease}
  .quiz-q{font-size:18px;font-weight:900;margin-bottom:18px}
  .quiz-opt{width:100%;text-align:left;padding:13px 20px;border-radius:14px;border:2px solid var(--border);background:transparent;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:10px;transition:all .25s;display:block}
  .quiz-opt:hover{border-color:var(--lesson-color);background:rgba(245,158,11,.08)}
  .quiz-opt.correct{border-color:var(--accent3);background:rgba(52,211,153,.12);color:var(--accent3)}
  .quiz-opt.wrong{border-color:var(--accent4);background:rgba(248,113,113,.08);color:var(--accent4)}
  .feedback{font-size:15px;font-weight:800;text-align:center;padding:12px;border-radius:12px;margin-top:6px;min-height:44px}
  @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes drawLine{from{stroke-dashoffset:600}to{stroke-dashoffset:0}}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
  @keyframes squareGrow{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
  svg text{font-family:'Nunito',sans-serif}
  .step-content{animation:fadeIn .5s ease}
  .next-lesson-btn{background:var(--accent3);color:#0a0917}
  .next-lesson-btn:hover{background:#6ee7b7}
</style>
</head>
<body>
<div class="outer">
  <div class="top-bar">
    <div class="lesson-label">📊 Lesson 2 of 6</div>
    <div class="lesson-nav-links">
      <a class="nav-link" href="lesson1.html">L1</a>
      <a class="nav-link current" href="lesson2.html">L2</a>
      <a class="nav-link" href="lesson3.html">L3</a>
      <a class="nav-link" href="lesson4.html">L4</a>
      <a class="nav-link" href="lesson5.html">L5</a>
      <a class="nav-link" href="lesson6.html">L6</a>
    </div>
  </div>
  <h1>📊 Introduction to Pythagorean Theorem</h1>
  <p class="subtitle">Understand what a² + b² = c² means in simple, clear steps.</p>
  <div class="stage" id="stage">
    <div class="timeline"><div class="timeline-fill" id="timeline-fill"></div></div>
    <div class="step-indicators" id="step-tabs"></div>
    <div id="main-content">
      <div class="content-area">
        <div class="visual-panel" id="visual-panel"></div>
        <div class="sign-panel" id="sign-panel"></div>
      </div>
    </div>
    <div class="controls">
      <button class="btn btn-play" id="btn-play" onclick="togglePlay()">⏸ Pause</button>
      <button class="btn btn-outline" id="btn-prev" onclick="prevStep()">◀ Prev</button>
      <button class="btn btn-outline" onclick="nextStep()">Next ▶</button>
      <span class="speed-label">Speed:</span>
      <button class="speed-btn" id="spd1" onclick="setSpeed(8000,'spd1')">0.5×</button>
      <button class="speed-btn active" id="spd2" onclick="setSpeed(5000,'spd2')">1×</button>
      <button class="speed-btn" id="spd3" onclick="setSpeed(2500,'spd3')">2×</button>
    </div>
  </div>
</div>

<script>
const STEPS = [
  {
    caption: '📐 You already know a <strong>right triangle</strong> has one special 90° corner. Now meet the rule that connects all three sides — the <strong>Pythagorean Theorem</strong>!',
    sign: 'TRIANGLE',
    handEmoji: '☝️',
    handNote: 'Use both index fingers and thumbs to form a triangle shape in front of you — touch the fingertips together to make the three corners. This is the ASL sign for TRIANGLE.',
    color: '#a78bfa',
    svg: `<svg viewBox="0 0 280 200" width="100%" height="auto">
      <polygon points="140,20 260,170 20,170" fill="rgba(167,139,250,.12)" stroke="#a78bfa" stroke-width="3" stroke-linejoin="round" style="animation:fadeIn .8s ease both"/>
      <rect x="20" y="144" width="26" height="26" fill="none" stroke="#34d399" stroke-width="2.5" style="animation:fadeIn .6s ease .4s both"/>
      <text x="140" y="195" fill="#9b96c4" font-size="13" text-anchor="middle" style="animation:fadeIn .5s ease .7s both">The right triangle — our starting point</text>
      <text x="140" y="15" fill="#a78bfa" font-size="15" font-weight="900" text-anchor="middle" style="animation:fadeIn .5s ease .9s both">Right Triangle</text>
    </svg>`
  },
  {
    caption: '📏 The two shorter sides are called the <strong>legs</strong>. We label them <strong>a</strong> and <strong>b</strong>. They form the right angle — the square corner.',
    sign: 'TWO / LEGS',
    handEmoji: '✌️',
    handNote: 'Hold up your index and middle fingers (a V shape) with your palm facing outward. This is the sign for TWO in ASL. For LEGS, point both index fingers downward and move them alternately like walking.',
    color: '#34d399',
    svg: `<svg viewBox="0 0 280 200" width="100%" height="auto">
      <polygon points="140,20 260,170 20,170" fill="rgba(167,139,250,.06)" stroke="#2e2a54" stroke-width="2" stroke-linejoin="round"/>
      <rect x="20" y="144" width="26" height="26" fill="none" stroke="#34d399" stroke-width="2.5"/>
      <line x1="20" y1="170" x2="260" y2="170" stroke="#34d399" stroke-width="5" stroke-linecap="round" style="animation:drawLine .7s ease .2s both;stroke-dasharray:600;stroke-dashoffset:600"/>
      <line x1="20" y1="170" x2="20" y2="20" stroke="#a78bfa" stroke-width="5" stroke-linecap="round" style="animation:drawLine .7s ease .5s both;stroke-dasharray:600;stroke-dashoffset:600"/>
      <text x="140" y="190" fill="#34d399" font-size="14" font-weight="900" text-anchor="middle" style="animation:fadeIn .5s ease .9s both">a (base leg)</text>
      <text x="5" y="100" fill="#a78bfa" font-size="14" font-weight="900" text-anchor="middle" style="animation:fadeIn .5s ease 1.1s both">b</text>
      <text x="5" y="116" fill="#a78bfa" font-size="14" font-weight="900" text-anchor="middle" style="animation:fadeIn .5s ease 1.1s both">(height)</text>
    </svg>`
  },
  {
    caption: '📐 The longest side — across from the right angle — is the <strong>hypotenuse</strong>. We label it <strong>c</strong>. It is always the longest of the three sides.',
    sign: 'LONG / HYPOTENUSE',
    handEmoji: '🤙',
    handNote: 'Extend your dominant hand flat and slide it along your other forearm from wrist to elbow in one smooth motion. This represents something being LONG. For HYPOTENUSE, fingerspell H-Y-P slowly with your hand.',
    color: '#f87171',
    svg: `<svg viewBox="0 0 280 200" width="100%" height="auto">
      <polygon points="140,20 260,170 20,170" fill="rgba(167,139,250,.06)" stroke="#2e2a54" stroke-width="2" stroke-linejoin="round"/>
      <rect x="20" y="144" width="26" height="26" fill="none" stroke="#34d399" stroke-width="2.5"/>
      <line x1="20" y1="170" x2="260" y2="170" stroke="#34d399" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
      <line x1="20" y1="170" x2="20" y2="20" stroke="#a78bfa" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
      <line x1="20" y1="20" x2="260" y2="170" stroke="#f87171" stroke-width="6" stroke-linecap="round" style="animation:drawLine .8s ease .2s both;stroke-dasharray:600;stroke-dashoffset:600"/>
      <text x="160" y="88" fill="#f87171" font-size="14" font-weight="900" text-anchor="middle" style="animation:fadeIn .5s ease 1s both">c = Hypotenuse</text>
      <text x="140" y="195" fill="#9b96c4" font-size="12" text-anchor="middle" style="animation:fadeIn .5s ease 1.2s both">Always opposite the right angle</text>
    </svg>`
  },
  {
    caption: '🔢 The theorem says: <strong>a² + b² = c²</strong>. The little ² means "squared" — multiply the number by itself! So a² = a × a.',
    sign: 'SQUARE / MULTIPLY',
    handEmoji: '🖐️',
    handNote: 'For SQUARE: use both index fingers to trace a square shape in the air (draw four sides). For MULTIPLY: cross both open hands at the wrists and then twist them apart — this is the ASL sign for MULTIPLY.',
    color: '#34d399',
    svg: `<svg viewBox="0 0 280 220" width="100%" height="auto">
      <polygon points="130,155 250,155 130,65" fill="rgba(245,158,11,.06)" stroke="#f59e0b" stroke-width="2"/>
      <rect x="130" y="155" width="80" height="80" fill="rgba(52,211,153,.18)" stroke="#34d399" stroke-width="2.5" style="animation:squareGrow .7s ease .4s both;transform-origin:130px 155px"/>
      <text x="170" y="200" fill="#34d399" font-size="13" font-weight="900" text-anchor="middle" style="animation:fadeIn .5s ease 1s both">a × a = a²</text>
      <text x="50" y="205" fill="#9b96c4" font-size="12" text-anchor="middle" style="animation:fadeIn .5s ease 1.2s both">The square on</text>
      <text x="50" y="220" fill="#9b96c4" font-size="12" text-anchor="middle" style="animation:fadeIn .5s ease 1.3s both">side "a"</text>
    </svg>`
  },
  {
    caption: '🧮 So <strong>a² + b² = c²</strong> means: the area of square-a <em>PLUS</em> the area of square-b <em>EQUALS</em> the area of square-c. They always balance perfectly!',
    sign: 'EQUALS',
    handEmoji: '🤲',
    handNote: 'Hold both index fingers horizontally (pointing left and right). Bring them close together and tap them flat against each other twice. This is the sign for EQUALS or SAME.',
    color: '#f59e0b',
    svg: `<svg viewBox="0 0 310 190" width="100%" height="auto">
      <rect x="15" y="75" width="55" height="55" fill="rgba(52,211,153,.22)" stroke="#34d399" stroke-width="2.5"/>
      <text x="42" y="108" fill="#34d399" font-size="17" font-weight="900" text-anchor="middle">a²</text>
      <text x="80" y="110" fill="#f0eeff" font-size="22" font-weight="900" style="animation:fadeIn .4s ease .3s both">+</text>
      <rect x="92" y="60" width="68" height="68" fill="rgba(167,139,250,.22)" stroke="#a78bfa" stroke-width="2.5" style="animation:squareGrow .6s ease .2s both;transform-origin:92px 60px"/>
      <text x="126" y="100" fill="#a78bfa" font-size="17" font-weight="900" text-anchor="middle" style="animation:fadeIn .4s ease .5s both">b²</text>
      <text x="172" y="110" fill="#f0eeff" font-size="22" font-weight="900" style="animation:fadeIn .4s ease .5s both">=</text>
      <rect x="185" y="45" width="115" height="115" fill="rgba(248,113,113,.22)" stroke="#f87171" stroke-width="2.5" style="animation:squareGrow .7s ease .4s both;transform-origin:185px 45px"/>
      <text x="242" y="110" fill="#f87171" font-size="17" font-weight="900" text-anchor="middle" style="animation:fadeIn .4s ease .8s both">c²</text>
      <text x="155" y="180" fill="#f59e0b" font-size="13" font-weight="800" text-anchor="middle" style="animation:fadeIn .5s ease 1s both">Areas add up perfectly every time!</text>
    </svg>`
  },
  {
    caption: '🌟 Remember: <strong>a² + b² = c²</strong>. This works for <strong>EVERY right triangle on Earth</strong> — without exception! It is one of the most powerful rules in all of mathematics.',
    sign: 'ALWAYS / EVERY TIME',
    handEmoji: '☝️',
    handNote: 'Hold up your index finger and move it in a smooth, full circle in front of you (clockwise). This is the sign for ALWAYS or EVERY TIME in ASL — it shows continuity and universality.',
    color: '#f59e0b',
    svg: `<svg viewBox="0 0 280 175" width="100%" height="auto">
      <rect x="25" y="18" width="230" height="82" rx="18" fill="rgba(245,158,11,.12)" stroke="#f59e0b" stroke-width="2.5" style="animation:pulse 2.5s ease-in-out infinite"/>
      <text x="140" y="68" text-anchor="middle" fill="#f59e0b" font-size="30" font-weight="900">a² + b² = c²</text>
      <text x="140" y="128" text-anchor="middle" fill="#9b96c4" font-size="13">Works for EVERY right triangle</text>
      <text x="60" y="158" fill="#34d399" font-size="13" font-weight="700">a = legs</text>
      <text x="140" y="158" fill="#a78bfa" font-size="13" font-weight="700" text-anchor="middle">b = legs</text>
      <text x="222" y="158" fill="#f87171" font-size="13" font-weight="700">c = hyp.</text>
    </svg>`
  }
];

const QUIZ = {q:'What does "a²" mean in the formula a² + b² = c²?',opts:['a + 2','a × a (a squared)','a ÷ 2','a − 2'],ans:1};

let currentStep=0,isPlaying=true,stepDuration=5000,elapsed=0,elapsedInterval=null,quizAnswered=false,showingQuiz=false;

function renderTabs(){document.getElementById('step-tabs').innerHTML=STEPS.map((s,i)=>`<div class="step-tab${i===currentStep?' active':i<currentStep?' done':''}" onclick="jumpStep(${i})">${i<currentStep?'✓':'Step '+(i+1)}</div>`).join('');}

function renderStep(){
  if(showingQuiz)return;
  const s=STEPS[currentStep];
  document.getElementById('visual-panel').innerHTML=`<div class="step-content">${s.svg}</div>`;
  document.getElementById('sign-panel').innerHTML=`<div class="step-content"><div class="caption">${s.caption}</div><div class="sign-block"><div class="sign-title">🤟 Sign Language — ${s.sign}</div><div class="sign-illustration"><div class="hand-emoji">${s.handEmoji}</div><div class="sign-text">${s.sign}</div></div><div class="sign-instruction">${s.handNote}</div></div></div>`;
  renderTabs();
  document.getElementById('btn-prev').disabled=currentStep===0;
}

function startTimer(){clearInterval(elapsedInterval);elapsed=0;document.getElementById('timeline-fill').style.width='0%';elapsedInterval=setInterval(()=>{elapsed+=80;const pct=Math.min((elapsed/stepDuration)*100,100);document.getElementById('timeline-fill').style.width=pct+'%';if(elapsed>=stepDuration){clearInterval(elapsedInterval);if(isPlaying)autoAdvance();}},80);}

function autoAdvance(){if(currentStep<STEPS.length-1){currentStep++;renderStep();startTimer();}else{showQuiz();}}
function togglePlay(){isPlaying=!isPlaying;const btn=document.getElementById('btn-play');if(isPlaying){btn.textContent='⏸ Pause';startTimer();}else{btn.textContent='▶ Play';clearInterval(elapsedInterval);}}
function nextStep(){clearInterval(elapsedInterval);if(currentStep<STEPS.length-1){currentStep++;renderStep();if(isPlaying)startTimer();}else{showQuiz();}}
function prevStep(){
  if(showingQuiz){showingQuiz=false;document.getElementById('main-content').innerHTML=`<div class="content-area"><div class="visual-panel" id="visual-panel"></div><div class="sign-panel" id="sign-panel"></div></div>`;document.getElementById('step-tabs').style.display='flex';document.querySelector('.controls').style.display='flex';renderStep();if(isPlaying)startTimer();return;}
  clearInterval(elapsedInterval);if(currentStep>0){currentStep--;renderStep();if(isPlaying)startTimer();}
}
function jumpStep(i){if(showingQuiz)return;clearInterval(elapsedInterval);currentStep=i;renderStep();if(isPlaying)startTimer();}
function setSpeed(ms,id){stepDuration=ms;document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active'));document.getElementById(id).classList.add('active');if(isPlaying){clearInterval(elapsedInterval);startTimer();}}

function showQuiz(){
  showingQuiz=true;clearInterval(elapsedInterval);document.getElementById('timeline-fill').style.width='100%';
  document.getElementById('step-tabs').style.display='none';document.querySelector('.controls').style.display='none';
  document.getElementById('main-content').innerHTML=`<div class="quiz-area"><div class="sign-block" style="margin-bottom:18px;display:inline-flex;align-items:center;gap:8px;padding:8px 14px;flex-direction:row"><span style="font-size:22px">🤟</span><span style="font-size:12px;font-weight:800;color:var(--lesson-color)">Sign: QUESTION — W-handshape, wiggle fingers gently</span></div><div class="quiz-q">📝 ${QUIZ.q}</div>${QUIZ.opts.map((o,i)=>`<button class="quiz-opt" id="opt${i}" onclick="checkAns(${i})">${String.fromCharCode(65+i)}) ${o}</button>`).join('')}<div class="feedback" id="feedback"></div><div style="margin-top:10px;text-align:center"><button class="btn btn-outline" onclick="restartLesson()" style="margin-right:8px">🔁 Restart</button><a href="lesson3.html"><button class="btn next-lesson-btn" id="next-btn" style="display:none">Next Lesson ▶</button></a></div></div>`;
}

function checkAns(i){if(quizAnswered)return;quizAnswered=true;document.querySelectorAll('.quiz-opt').forEach((b,j)=>{b.disabled=true;if(j===QUIZ.ans)b.classList.add('correct');else if(j===i&&i!==QUIZ.ans)b.classList.add('wrong');});const fb=document.getElementById('feedback');fb.innerHTML=i===QUIZ.ans?'<span style="color:var(--accent3)">✅ Correct! Well done! 🎉</span>':'<span style="color:var(--accent4)">❌ Not quite — see the green answer above.</span>';document.getElementById('next-btn').style.display='inline-flex';}

function restartLesson(){showingQuiz=false;quizAnswered=false;currentStep=0;document.getElementById('main-content').innerHTML=`<div class="content-area"><div class="visual-panel" id="visual-panel"></div><div class="sign-panel" id="sign-panel"></div></div>`;document.getElementById('step-tabs').style.display='flex';document.querySelector('.controls').style.display='flex';isPlaying=true;document.getElementById('btn-play').textContent='⏸ Pause';renderStep();startTimer();}

renderStep();startTimer();
</script>
</body>
</html>
