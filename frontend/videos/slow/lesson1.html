<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Right Triangle Animation</title>
<style>
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes slideUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
  @keyframes slideDown { from{opacity:0;transform:translateY(-18px)} to{opacity:1;transform:translateY(0)} }
  @keyframes pop { 0%{opacity:0;transform:scale(0.3)} 60%{transform:scale(1.12)} 100%{opacity:1;transform:scale(1)} }
  @keyframes drawLine { from{stroke-dashoffset:700} to{stroke-dashoffset:0} }
  @keyframes pulse { 0%,100%{opacity:1;stroke-width:7} 50%{opacity:0.7;stroke-width:11} }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
  @keyframes spinIn { from{opacity:0;transform:rotate(-90deg) scale(0)} to{opacity:1;transform:rotate(0) scale(1)} }
  @keyframes starTwinkle { 0%,100%{opacity:1;r:5} 50%{opacity:0.3;r:2} }
  @keyframes bgShift {
    0%{fill:#1a0533} 20%{fill:#0a1a4a} 40%{fill:#003322} 60%{fill:#330d00} 80%{fill:#1a0a2e} 100%{fill:#1a0533}
  }

  body {
    margin: 0;
    padding: 24px;
    background: #020617;
    font-family: sans-serif;
    color: #fff;
  }

  #stage { display:block; width:100%; border-radius:16px; overflow:hidden; }

  .scene { opacity:0; }

  .line-a { stroke-dasharray:700; stroke-dashoffset:700; }
  .line-b { stroke-dasharray:700; stroke-dashoffset:700; }
  .line-c { stroke-dasharray:700; stroke-dashoffset:700; }

  .caption-wrap {
    display:flex; align-items:center; justify-content:center;
    min-height:56px; padding:0 12px;
  }
  #caption-text {
    background:#fff;
    color:#26215C;
    border-radius:12px;
    padding:10px 24px;
    font-size:20px;
    font-weight:500;
    text-align:center;
    max-width:640px;
    border:2px solid #7F77DD;
    opacity:0;
    transition:opacity 0.5s;
    font-family:sans-serif;
  }
  #progress-bar {
    height:6px;
    background:#534AB7;
    width:0%;
    border-radius:3px;
    transition:width 0.4s linear;
  }
  #replay-btn {
    display:none;
    margin:8px auto 0;
    padding:10px 32px;
    background:#534AB7;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:16px;
    font-weight:500;
    cursor:pointer;
  }
  .back-wrap {
    max-width: 760px;
    margin: 0 auto 12px;
    display: flex;
    justify-content: flex-start;
  }
  .back-link {
    color: #c4b5fd;
    text-decoration: none;
    font-weight: 600;
  }
</style>
</head>

<div class="back-wrap">

      <text x="540" y="346" text-anchor="middle" font-size="20" font-family="sans-serif" fill="#412402" font-weight="700" opacity="0">
        <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.8s" fill="freeze"/>
        ★
      </text>
      <circle cx="140" cy="80" r="22" fill="#FAC775" opacity="0">
        <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1s" fill="freeze"/>
        <animate attributeName="r" values="20;28;20" dur="1s" begin="1.2s" repeatCount="indefinite"/>
      </circle>
      <text x="140" y="86" text-anchor="middle" font-size="20" font-family="sans-serif" fill="#412402" font-weight="700" opacity="0">

  </svg>

  <div class="caption-wrap">
    <div id="caption-text"></div>
  </div>
  <div style="text-align:center">
    <button id="replay-btn" onclick="startAnimation()">Replay</button>
  </div>
</div>

<script>
const scenes = [
  { id:'scene0', caption:'Welcome! Let\'s learn about the Right Triangle!', dur:3500 },
  { id:'scene1', caption:'A triangle has 3 sides and 3 corners (vertices)', dur:4000 },
  { id:'scene2', caption:'One corner has a square symbol — that means 90° (a right angle)!', dur:4000 },
  { id:'scene3', caption:'The bottom flat side is called the BASE — we label it (a)', dur:4000 },
  { id:'scene4', caption:'The tall upright side is called the HEIGHT — we label it (b)', dur:4000 },
  { id:'scene5', caption:'The long diagonal side is the HYPOTENUSE — we label it (c)', dur:4500 },
  { id:'scene6', caption:'Here are all 3 sides together: Base (a), Height (b), Hypotenuse (c)', dur:4000 },
  { id:'scene7', caption:'The HYPOTENUSE is always the LONGEST side — it goes from corner to corner!', dur:4500 },
  { id:'scene8', caption:'Well done! You now know what a Right Triangle is!', dur:4000 }
];

let currentScene = -1;
let timer = null;
const total = scenes.reduce((s, x) => s + x.dur, 0);

function showScene(idx) {
  scenes.forEach((s, i) => {
    const el = document.getElementById(s.id);
    el.style.opacity = i === idx ? '1' : '0';
    if (i === idx) {
      el.innerHTML = el.innerHTML;
    }
  });
  const cap = document.getElementById('caption-text');
  cap.style.opacity = '0';
  cap.textContent = scenes[idx].caption;
  setTimeout(() => { cap.style.opacity = '1'; }, 100);
}

function updateProgress(frac) {
  document.getElementById('progress-bar').style.width = (frac * 100) + '%';
}

function startAnimation() {
  if (timer) clearTimeout(timer);
  document.getElementById('replay-btn').style.display = 'none';
  currentScene = -1;
  updateProgress(0);
  nextScene();
}

function nextScene() {
  currentScene++;
  if (currentScene >= scenes.length) {
    updateProgress(1);
    document.getElementById('replay-btn').style.display = 'block';
    return;
  }
  showScene(currentScene);
  let cumul = 0;
  for (let i = 0; i < currentScene; i++) cumul += scenes[i].dur;
  updateProgress(cumul / total);
  timer = setTimeout(() => {
    updateProgress((cumul + scenes[currentScene].dur) / total);
    nextScene();
  }, scenes[currentScene].dur);
}

startAnimation();
</script>

</body>
