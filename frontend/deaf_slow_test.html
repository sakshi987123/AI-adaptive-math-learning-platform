<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Evaluation Quiz - Deaf Slow Learner</title>
<link rel="stylesheet" href="styles.css"/>
<style>
html,body{height:100vh;overflow:hidden;background:#020c1b;color:#edf2f7;font-family:Inter,sans-serif;}
.quiz-nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;background:rgba(2,12,27,0.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.06);}
.quiz-nav a{color:#c084fc;text-decoration:none;font-weight:600;font-size:0.9rem;}
.quiz-nav .badge{padding:0.3rem 0.9rem;border-radius:100px;background:rgba(168,85,247,0.12);border:1px solid rgba(168,85,247,0.3);color:#c084fc;font-size:0.8rem;font-weight:600;}
.quiz-page{position:fixed;inset:0;padding-top:64px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding-left:1.5rem;padding-right:1.5rem;}
body.results-mode{overflow-y:auto;height:auto;}
body.results-mode .quiz-page{position:relative;inset:auto;overflow-y:visible;height:auto;min-height:100vh;justify-content:flex-start;padding-top:80px;padding-bottom:3rem;}
.progress-wrap{width:100%;max-width:780px;display:flex;align-items:center;justify-content:space-between;margin-bottom:0.6rem;}
.progress-label{font-size:0.82rem;color:#64748b;}
.q-counter{font-family:Outfit,sans-serif;font-weight:700;font-size:0.9rem;color:#c084fc;}
.progress-bar{width:100%;max-width:780px;height:5px;background:rgba(255,255,255,0.06);border-radius:100px;overflow:hidden;margin-bottom:1rem;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--deaf),#3b82f6);border-radius:100px;transition:width 0.5s ease;}
.quiz-card{width:100%;max-width:780px;background:rgba(8,20,50,0.95);border:1px solid rgba(168,85,247,0.15);border-radius:24px;padding:1.8rem 2rem;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
.q-type-badge{display:inline-flex;align-items:center;gap:0.5rem;padding:0.35rem 0.9rem;background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.2);border-radius:100px;font-size:0.78rem;font-weight:500;color:#c084fc;margin-bottom:0.9rem;}
.diagram-area{background:rgba(0,0,0,0.25);border:1px solid rgba(168,85,247,0.12);border-radius:14px;padding:1rem 1.5rem;margin-bottom:0.9rem;text-align:center;font-family:Outfit,sans-serif;font-size:1.8rem;font-weight:800;color:#e2e8f0;min-height:70px;display:flex;align-items:center;justify-content:center;}
.question-text{font-family:Outfit,sans-serif;font-size:clamp(1.2rem,2.2vw,1.6rem);font-weight:800;line-height:1.3;margin-bottom:0.3rem;}
.question-sub{color:#64748b;font-size:0.88rem;margin-bottom:0.9rem;}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.7rem;margin-bottom:0.9rem;}
.option-btn{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:0.9rem 1.1rem;text-align:left;cursor:pointer;color:#fff;font-family:Inter,sans-serif;font-size:0.95rem;transition:all 0.2s;display:flex;align-items:center;gap:0.75rem;}
.option-btn:hover:not(:disabled){background:rgba(168,85,247,0.08);border-color:rgba(168,85,247,0.35);transform:translateY(-1px);}
.option-btn.selected{background:rgba(168,85,247,0.12);border-color:var(--deaf);}
.option-btn.correct{background:rgba(16,185,129,0.12);border-color:#10b981;}
.option-btn.wrong{background:rgba(239,68,68,0.12);border-color:#ef4444;}
.opt-key{width:32px;height:32px;border-radius:8px;flex-shrink:0;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-family:Outfit,sans-serif;font-weight:700;font-size:0.88rem;}
.option-btn.selected .opt-key{background:var(--deaf);color:#fff;}
.option-btn.correct .opt-key{background:#10b981;color:#000;}
.option-btn.wrong .opt-key{background:#ef4444;color:#fff;}
.hint-box{display:none;padding:0.8rem 1rem;border-radius:12px;margin-bottom:0.8rem;background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.2);font-size:0.85rem;color:#93c5fd;}
.feedback-box{display:none;padding:0.8rem 1rem;border-radius:12px;margin-bottom:0.8rem;font-size:0.88rem;}
.feedback-box.correct{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);}
.feedback-box.wrong{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);}
.feedback-title{font-family:Outfit,sans-serif;font-weight:700;font-size:1rem;margin-bottom:0.2rem;}
.feedback-box.correct .feedback-title{color:#10b981;}
.feedback-box.wrong .feedback-title{color:#ef4444;}
.feedback-desc{color:#94a3b8;}
.btn-row{display:flex;gap:0.7rem;flex-wrap:wrap;}
.btn{padding:0.7rem 1.3rem;border-radius:100px;border:none;cursor:pointer;font-family:Outfit,sans-serif;font-weight:700;font-size:0.88rem;transition:all 0.2s;}
.btn-primary{background:linear-gradient(135deg,var(--deaf),#3b82f6);color:#fff;box-shadow:0 4px 20px rgba(168,85,247,0.3);}
.btn-primary:hover{transform:translateY(-1px);}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.btn-secondary{background:rgba(255,255,255,0.07);color:#94a3b8;border:1px solid rgba(255,255,255,0.1);}
.btn-secondary:hover{background:rgba(255,255,255,0.12);color:#fff;}
.results-wrapper{width:100%;max-width:1100px;}
.results-grid{display:grid;grid-template-columns:300px 1fr;gap:1.2rem;align-items:start;width:100%;}
.col-left,.col-right{display:flex;flex-direction:column;gap:1.2rem;}
.score-card,.topic-card,.review-card,.ai-card{background:rgba(8,20,50,0.95);border-radius:22px;padding:1.5rem;box-shadow:0 12px 40px rgba(0,0,0,0.4);}
.score-card{border:1px solid rgba(168,85,247,0.2);text-align:center;}
.topic-card,.ai-card{border:1px solid rgba(168,85,247,0.2);}
.review-card{border:1px solid rgba(168,85,247,0.15);}
.result-title-text{font-family:Outfit,sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:0.3rem;}
.result-score{font-family:Outfit,sans-serif;font-size:4rem;font-weight:800;color:#c084fc;line-height:1;}
.result-label{color:#64748b;font-size:0.82rem;margin:0.4rem 0 1rem;}
.stats-row{display:grid;grid-template-columns:1fr;gap:0.6rem;margin-bottom:1rem;}
.stat-box{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:0.75rem 1rem;display:flex;align-items:center;justify-content:space-between;}
.stat-box .val{font-family:Outfit,sans-serif;font-size:1.8rem;font-weight:800;}
.stat-box .lbl{font-size:0.82rem;color:#64748b;}
.result-actions{display:flex;gap:0.7rem;justify-content:center;flex-wrap:wrap;}
.imp-header{display:flex;align-items:center;gap:0.7rem;margin-bottom:0.9rem;}
.imp-header h3{font-family:Outfit,sans-serif;font-size:0.95rem;font-weight:800;color:#c084fc;margin:0;}
.badge-ai{padding:0.2rem 0.6rem;border-radius:100px;font-size:0.68rem;font-weight:600;background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.3);color:#c084fc;white-space:nowrap;}
.topic-row{margin-bottom:0.65rem;}
.topic-label{display:flex;justify-content:space-between;font-size:0.8rem;margin-bottom:0.2rem;}
.topic-name{color:#e2e8f0;}.topic-pct{font-weight:700;}
.topic-bar-bg{height:7px;background:rgba(255,255,255,0.06);border-radius:100px;overflow:hidden;}
.topic-bar-fill{height:100%;border-radius:100px;transition:width 0.8s ease;}
.review-heading{font-family:Outfit,sans-serif;font-weight:700;font-size:0.9rem;color:#94a3b8;margin-bottom:0.75rem;}
.review-scroll{max-height:240px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(168,85,247,0.3) transparent;}
.review-item{padding:0.7rem 0.85rem;border-radius:11px;margin-bottom:0.5rem;font-size:0.82rem;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:#fca5a5;}
.review-item strong{display:block;margin-bottom:0.2rem;color:#f87171;font-size:0.84rem;}
.review-none{color:#10b981;text-align:center;padding:1.5rem;font-size:0.88rem;}
.ai-plan-text{background:rgba(168,85,247,0.06);border:1px solid rgba(168,85,247,0.15);border-radius:12px;padding:0.85rem 1rem;font-size:0.85rem;line-height:1.7;color:#e2e8f0;margin-bottom:0.8rem;}
.ai-plan-loading{color:#64748b;font-size:0.82rem;font-style:italic;}
.next-step-item{display:flex;align-items:flex-start;gap:0.6rem;padding:0.45rem 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:0.81rem;color:#cbd5e1;}
.next-step-item:last-child{border-bottom:none;}
.step-icon{font-size:0.9rem;flex-shrink:0;margin-top:0.1rem;}
@media(max-width:800px){.results-grid{grid-template-columns:1fr;}}
@media(max-width:600px){.options-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="orb orb-purple" style="opacity:0.2;"></div>
<div class="orb orb-cyan" style="opacity:0.1;"></div>
<nav class="quiz-nav">
  <a href="VideoPlayer.html">Back to Lessons</a>
  <span class="badge">Visual Evaluation - Slow Learner</span>
</nav>
<div class="quiz-page">
  <div class="progress-wrap">
    <span class="progress-label">Evaluation Quiz</span>
    <span class="q-counter" id="q-counter">Question 1 of 5</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="quiz-card" id="quiz-card">
    <div class="q-type-badge">Visual Question</div>
    <div class="diagram-area" id="diagram-area"></div>
    <div class="question-text" id="question-text">Loading...</div>
    <div class="question-sub" id="question-sub"></div>
    <div class="options-grid" id="options-grid"></div>
    <div class="hint-box" id="hint-box"></div>
    <div class="feedback-box" id="feedback-box">
      <div class="feedback-title" id="feedback-title"></div>
      <div class="feedback-desc" id="feedback-desc"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="submit-btn" disabled onclick="submitAnswer()">Submit Answer</button>
      <button class="btn btn-secondary" onclick="showHint()">Hint</button>
    </div>
  </div>
  <div class="results-wrapper" id="results-wrapper" style="display:none;">
    <div class="results-grid">
      <div class="col-left">
        <div class="score-card">
          <div class="result-title-text" id="result-title"></div>
          <div class="result-score" id="result-score">0/5</div>
          <div class="result-label" id="result-label"></div>
          <div class="stats-row">
            <div class="stat-box"><div class="lbl">Correct</div><div class="val" id="stat-correct" style="color:#10b981;">0</div></div>
            <div class="stat-box"><div class="lbl">Wrong</div><div class="val" id="stat-wrong" style="color:#ef4444;">0</div></div>
            <div class="stat-box"><div class="lbl">Accuracy</div><div class="val" id="stat-pct" style="color:#c084fc;">0%</div></div>
          </div>
          <div class="result-actions">
            <button class="btn btn-primary" onclick="restartQuiz()">Try Again</button>
            <button class="btn btn-secondary" onclick="location.href='VideoPlayer.html'">Back to Lessons</button>
          </div>
        </div>
        <div class="topic-card">
          <div class="imp-header"><h3>Topic Analysis</h3><span class="badge-ai">XAI + Rules</span></div>
          <div id="topic-bars-content"><div class="ai-plan-loading">Analyzing...</div></div>
        </div>
      </div>
      <div class="col-right">
        <div class="review-card">
          <div class="review-heading">Questions to Review</div>
          <div class="review-scroll" id="review-list"></div>
        </div>
        <div class="ai-card">
          <div class="imp-header"><h3>AI Recommendations</h3><span class="badge-ai">GenAI</span></div>
          <div class="ai-plan-text" id="ai-plan-text"><span class="ai-plan-loading">Generating your plan...</span></div>
          <div id="next-steps"></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
const questions=[
  {text:"What does the Pythagoras theorem state?",sub:"Choose the correct formula.",diagram:"a + b = ? or a squared + b squared = c squared",options:{A:"a + b = c",B:"a squared + b squared = c squared",C:"a times b = c",D:"c squared = a + b"},correct:"B",hint:"The theorem involves squares of the sides.",explanation:"The Pythagoras theorem states that a squared plus b squared equals c squared."},
  {text:"What is the name of the longest side in a right triangle?",sub:"This side is opposite the right angle.",diagram:"Right Triangle with sides a, b, c",options:{A:"The leg",B:"The base",C:"The hypotenuse",D:"The height"},correct:"C",hint:"The longest side is opposite the 90 degree angle.",explanation:"The hypotenuse is the longest side, always opposite the right angle."},
  {text:"If a equals 3 and b equals 4, what is c squared?",sub:"Use the formula: a squared plus b squared.",diagram:"3 squared + 4 squared = ?",options:{A:"7",B:"12",C:"25",D:"49"},correct:"C",hint:"3 squared is 9. 4 squared is 16. Add them.",explanation:"9 plus 16 equals 25. So c squared equals 25."},
  {text:"If c squared equals 25, what is c?",sub:"Find the square root of 25.",diagram:"c squared = 25, so c = ?",options:{A:"3",B:"4",C:"5",D:"6"},correct:"C",hint:"5 times 5 equals 25.",explanation:"c equals 5 because 5 squared is 25."},
  {text:"A right triangle has legs 6 and 8. What is the hypotenuse?",sub:"Calculate c using the Pythagoras theorem.",diagram:"a = 6, b = 8, c = ?",options:{A:"10",B:"12",C:"14",D:"100"},correct:"A",hint:"6 squared is 36. 8 squared is 64. 36 plus 64 equals 100.",explanation:"The square root of 100 is 10. So the hypotenuse is 10."}
];
let currentIndex=0,score=0,answered=false;
const answers=[];
function loadQuestion(idx){
  const q=questions[idx];answered=false;window._sel=null;
  document.getElementById("q-counter").textContent="Question "+(idx+1)+" of "+questions.length;
  document.getElementById("progress-fill").style.width=(idx/questions.length*100)+"%";
  document.getElementById("diagram-area").textContent=q.diagram;
  document.getElementById("question-text").textContent=q.text;
  document.getElementById("question-sub").textContent=q.sub;
  document.getElementById("hint-box").style.display="none";
  document.getElementById("feedback-box").style.display="none";
  document.getElementById("submit-btn").disabled=true;
  document.getElementById("submit-btn").textContent="Submit Answer";
  document.getElementById("submit-btn").onclick=submitAnswer;
  document.getElementById("options-grid").innerHTML=Object.entries(q.options).map(([k,v])=>
    "<button class=\"option-btn\" data-key=\""+k+"\" onclick=\"selectOption(this,'"+k+"')\"><span class=\"opt-key\">"+k+"</span><span>"+v+"</span></button>"
  ).join("");
}
function selectOption(btn,key){
  if(answered)return;
  document.querySelectorAll(".option-btn").forEach(b=>b.classList.remove("selected"));
  btn.classList.add("selected");
  document.getElementById("submit-btn").disabled=false;
  window._sel=key;
}
function showHint(){
  const q=questions[currentIndex];
  const hb=document.getElementById("hint-box");
  hb.textContent="Hint: "+q.hint;hb.style.display="block";
}
function submitAnswer(){
  const key=window._sel||document.querySelector(".option-btn.selected")?.dataset.key;
  if(!key||answered)return;
  answered=true;
  const q=questions[currentIndex];
  const correct=key===q.correct;
  if(correct)score++;
  answers.push({text:q.text,selected:key,correct:correct,correctKey:q.correct,correctVal:q.options[q.correct],explanation:q.explanation});
  document.querySelectorAll(".option-btn").forEach(b=>{
    b.disabled=true;
    if(b.dataset.key===q.correct)b.classList.add("correct");
    if(b.dataset.key===key&&!correct)b.classList.add("wrong");
  });
  const fb=document.getElementById("feedback-box");
  fb.className=correct?"feedback-box correct":"feedback-box wrong";
  document.getElementById("feedback-title").textContent=correct?"Correct!":"Wrong Answer";
  document.getElementById("feedback-desc").textContent=q.explanation;
  fb.style.display="block";
  const btn=document.getElementById("submit-btn");
  btn.textContent=currentIndex<questions.length-1?"Next Question":"See Results";
  btn.onclick=function(){window._sel=null;currentIndex++;if(currentIndex<questions.length)loadQuestion(currentIndex);else showResults();};
  btn.disabled=false;
}
function showResults(){
  document.getElementById("quiz-card").style.display="none";
  document.body.classList.add("results-mode");
  document.getElementById("results-wrapper").style.display="block";
  document.getElementById("progress-fill").style.width="100%";
  document.getElementById("q-counter").textContent="Complete!";
  const pct=Math.round(score/questions.length*100);
  const wrong=answers.filter(function(a){return !a.correct;});
  document.getElementById("result-title").textContent=pct===100?"Perfect Score!":pct>=60?"Good Work!":"Keep Practicing!";
  document.getElementById("result-score").textContent=score+"/"+questions.length;
  document.getElementById("result-label").textContent="You got "+score+" out of "+questions.length+" correct.";
  document.getElementById("stat-correct").textContent=score;
  document.getElementById("stat-wrong").textContent=wrong.length;
  document.getElementById("stat-pct").textContent=pct+"%";
  const rl=document.getElementById("review-list");
  if(wrong.length===0){rl.innerHTML="<div class=\"review-none\">No mistakes - excellent work!</div>";}
  else{rl.innerHTML=wrong.map(function(a){return "<div class=\"review-item\"><strong>"+a.text+"</strong>Your answer: "+a.selected+" - Correct: "+a.correctKey+" ("+a.correctVal+")<br><span style=\"color:#94a3b8;\">"+a.explanation+"</span></div>";}).join("");}
  fetchAnalysis();
}
async function fetchAnalysis(){
  try{
    const res=await fetch("http://127.0.0.1:5000/analyze",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({answers:answers,level:"slow"})});
    const data=await res.json();
    renderTopicBars(data);renderAIPlan(data);
    const uid=localStorage.getItem("userUID");
    if(uid)fetch("http://127.0.0.1:5000/user/save_result",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({uid:uid,quiz_type:"evaluation",disability:"deaf",level:"slow",accuracy:data.percentage||0,total_questions:data.total||5,correct:data.score||0,wrong:(data.total||5)-(data.score||0),weak_topics:data.weak_topics||[],strong_topics:data.strong_topics||[],topic_impacts:data.topic_impacts||{},improvement_text:data.improvement_text||"",answers_detail:answers})}).catch(function(){});
  }catch(e){
    document.getElementById("topic-bars-content").innerHTML="<div class=\"ai-plan-loading\">Could not load analysis.</div>";
    document.getElementById("ai-plan-text").textContent="Could not connect to the AI.";
  }
}
function renderTopicBars(data){
  const c=document.getElementById("topic-bars-content");
  const impacts=data.topic_impacts;const labels=data.topic_labels;
  if(!impacts||!Object.keys(impacts).length){c.innerHTML="<div class=\"ai-plan-loading\">No topic data.</div>";return;}
  c.innerHTML=Object.entries(impacts).map(function(entry){
    const t=entry[0];const i=entry[1];const l=labels[t]||t;const p=i.accuracy;
    const col=p>=80?"#10b981":p>=50?"#f59e0b":"#ef4444";
    const w=data.weak_topics.includes(t);
    return "<div class=\"topic-row\"><div class=\"topic-label\"><span class=\"topic-name\">"+(w?"Warning ":"OK ")+l+"</span><span class=\"topic-pct\" style=\"color:"+col+"\">"+p+"%</span></div><div class=\"topic-bar-bg\"><div class=\"topic-bar-fill\" style=\"width:"+p+"%;background:"+col+";\"></div></div></div>";
  }).join("");
}
function renderAIPlan(data){
  document.getElementById("ai-plan-text").textContent=data.improvement_text;
  const steps=[];
  if(data.weak_topics.includes("theorem"))steps.push({i:"Book",t:"Re-read the Pythagoras theorem definition."});
  if(data.weak_topics.includes("hypotenuse"))steps.push({i:"Triangle",t:"Practice identifying the hypotenuse."});
  if(data.weak_topics.includes("calculation"))steps.push({i:"Calc",t:"Practice squaring: 3 squared is 9, 4 squared is 16."});
  if(data.weak_topics.includes("square_root"))steps.push({i:"Root",t:"Learn square roots: root 25 is 5, root 100 is 10."});
  if(data.weak_topics.includes("application"))steps.push({i:"Build",t:"Try solving real-world triangle problems."});
  if(!steps.length)steps.push({i:"Star",t:"Great job! Try the advanced quiz next."});
  document.getElementById("next-steps").innerHTML="<div style=\"font-size:0.82rem;color:#94a3b8;margin:0.8rem 0 0.4rem;font-weight:600;\">Next Steps</div>"+
    steps.map(function(s){return "<div class=\"next-step-item\"><span class=\"step-icon\">"+s.i+"</span><span>"+s.t+"</span></div>";}).join("");
}
function restartQuiz(){
  currentIndex=0;score=0;answers.length=0;window._sel=null;
  document.body.classList.remove("results-mode");
  document.getElementById("results-wrapper").style.display="none";
  document.getElementById("quiz-card").style.display="block";
  loadQuestion(0);
}
window.onload=function(){loadQuestion(0);};
</script>
</body>
</html>
