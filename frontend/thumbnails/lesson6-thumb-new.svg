<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ecdc4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow6">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="320" height="180" fill="url(#bg6)"/>
  
  <!-- Summary elements -->
  <g opacity="0.3">
    <circle cx="50" cy="40" r="2" fill="white"/>
    <circle cx="270" cy="60" r="2" fill="white"/>
    <circle cx="80" cy="120" r="2" fill="white"/>
    <circle cx="240" cy="110" r="2" fill="white"/>
    <line x1="50" y1="40" x2="270" y2="60" stroke="white" stroke-width="1"/>
    <line x1="270" y1="60" x2="80" y2="120" stroke="white" stroke-width="1"/>
    <line x1="80" y1="120" x2="240" y2="110" stroke="white" stroke-width="1"/>
  </g>
  
  <!-- Main summary visualization -->
  <g transform="translate(160, 85)" filter="url(#glow6)">
    <rect x="-75" y="-30" width="150" height="50" fill="none" stroke="white" stroke-width="2" rx="8"/>
    <text x="0" y="-8" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">COMPLETE</text>
    <text x="0" y="8" text-anchor="middle" fill="#4ecdc4" font-family="Arial, sans-serif" font-size="11">Pythagoras Summary</text>
    <circle cx="-60" cy="-15" r="3" fill="#4ecdc4"/>
    <circle cx="-30" cy="-15" r="3" fill="#4ecdc4"/>
    <circle cx="0" cy="-15" r="3" fill="#4ecdc4"/>
    <circle cx="30" cy="-15" r="3" fill="#4ecdc4"/>
    <circle cx="60" cy="-15" r="3" fill="#4ecdc4"/>
  </g>
  
  <!-- Title section -->
  <rect x="10" y="140" width="300" height="30" fill="rgba(0,0,0,0.3)" rx="8"/>
  <text x="160" y="158" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Lesson 6</text>
  <text x="160" y="172" text-anchor="middle" fill="#4ecdc4" font-family="Arial, sans-serif" font-size="10">Complete Summary</text>
</svg>
