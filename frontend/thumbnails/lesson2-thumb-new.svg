<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="320" height="180" fill="url(#bg2)"/>
  
  <!-- Mathematical background pattern -->
  <pattern id="math-pattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="rgba(255,255,255,0.1)"/>
  </pattern>
  <rect width="320" height="180" fill="url(#math-pattern)"/>
  
  <!-- Formula visualization -->
  <g transform="translate(160, 85)" filter="url(#glow2)">
    <rect x="-70" y="-25" width="140" height="50" fill="none" stroke="white" stroke-width="2" rx="10"/>
    <text x="0" y="-5" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">a² + b² = c²</text>
    <text x="0" y="12" text-anchor="middle" fill="#ffeb3b" font-family="Arial, sans-serif" font-size="11">Pythagoras Formula</text>
  </g>
  
  <!-- Title section -->
  <rect x="10" y="140" width="300" height="30" fill="rgba(0,0,0,0.3)" rx="8"/>
  <text x="160" y="158" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Lesson 2</text>
  <text x="160" y="172" text-anchor="middle" fill="#ffeb3b" font-family="Arial, sans-serif" font-size="10">Formula Concept</text>
</svg>
