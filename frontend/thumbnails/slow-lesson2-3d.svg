<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-slow2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="formula-slow2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
    <filter id="soft-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.25"/>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Soft background -->
  <rect width="320" height="180" fill="url(#bg-slow2)"/>
  
  <!-- Dots pattern -->
  <pattern id="dots-pattern" x="0" y="0" width="25" height="25" patternUnits="userSpaceOnUse">
    <circle cx="12.5" cy="12.5" r="1.5" fill="rgba(251,191,36,0.1)"/>
  </pattern>
  <rect width="320" height="180" fill="url(#dots-pattern)"/>
  
  <!-- Simple formula box -->
  <g transform="translate(160, 85)" filter="url(#soft-shadow)">
    <rect x="-60" y="-20" width="120" height="40" fill="url(#formula-slow2)" rx="10" filter="url(#soft-glow)"/>
    <text x="0" y="0" text-anchor="middle" fill="#7c2d12" font-family="Arial, sans-serif" font-size="16" font-weight="600">a² + b² = c²</text>
    <text x="0" y="18" text-anchor="middle" fill="#7c2d12" font-family="Arial, sans-serif" font-size="10" font-weight="500">Pythagoras Theorem</text>
  </g>
  
  <!-- Floating elements -->
  <g opacity="0.6">
    <circle cx="60" cy="40" r="2" fill="#fbbf24" filter="url(#soft-glow)"/>
    <circle cx="260" cy="60" r="1.5" fill="#fbbf24" filter="url(#soft-glow)"/>
    <circle cx="80" cy="130" r="2" fill="#fbbf24" filter="url(#soft-glow)"/>
    <circle cx="240" cy="120" r="1.5" fill="#fbbf24" filter="url(#soft-glow)"/>
  </g>
  
  <!-- Title section -->
  <rect x="10" y="140" width="300" height="30" fill="rgba(251,191,36,0.15)" rx="8"/>
  <text x="160" y="158" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="600">Lesson 2</text>
  <text x="160" y="172" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="10">Introduction to Pythagoras</text>
</svg>
