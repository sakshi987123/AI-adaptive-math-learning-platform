<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-enhanced3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="square-enhanced3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="deep-shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-opacity="0.7"/>
    </filter>
    <filter id="bright-glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="spotlight">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Dynamic background -->
  <rect width="320" height="180" fill="url(#bg-enhanced3)"/>
  
  <!-- Spotlight effect -->
  <ellipse cx="160" cy="90" rx="120" ry="60" fill="url(#spotlight)" opacity="0.5"/>
  
  <!-- Animated pattern -->
  <pattern id="animated-pattern" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
    <circle cx="25" cy="25" r="2" fill="rgba(251,191,36,0.1)">
      <animate attributeName="r" values="2;3;2" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="10" cy="10" r="1" fill="rgba(251,191,36,0.08)">
      <animate attributeName="r" values="1;1.5;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </pattern>
  <rect width="320" height="180" fill="url(#animated-pattern)"/>
  
  <!-- Enhanced visual proof -->
  <g transform="translate(160, 85)" filter="url(#deep-shadow)">
    <!-- Triangle outline -->
    <polygon points="-60,-25 -65,35 65,35" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    
    <!-- Colored squares with 3D effect -->
    <g filter="url(#bright-glow)">
      <rect x="-70" y="-35" width="25" height="25" fill="url(#square-enhanced3)" rx="4" transform="skewY(-5)"/>
      <rect x="-70" y="-5" width="25" height="25" fill="url(#square-enhanced3)" rx="4" transform="skewY(5)"/>
      <rect x="45" y="-35" width="25" height="25" fill="url(#square-enhanced3)" rx="4" transform="skewY(-5)"/>
    </g>
    
    <!-- Enhanced labels -->
    <text x="-70" y="-25" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold" filter="url(#bright-glow)">a²</text>
    <text x="-70" y="15" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold" filter="url(#bright-glow)">b²</text>
    <text x="45" y="-25" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold" filter="url(#bright-glow)">c²</text>
  </g>
  
  <!-- Floating mathematical symbols -->
  <g opacity="0.8">
    <text x="50" y="40" fill="#fbbf24" font-family="Arial, sans-serif" font-size="20" font-weight="bold" filter="url(#bright-glow)">√</text>
    <text x="270" y="65" fill="#f59e0b" font-family="Arial, sans-serif" font-size="18" font-weight="bold" filter="url(#bright-glow)">+</text>
    <text x="80" y="130" fill="#fbbf24" font-family="Arial, sans-serif" font-size="16" font-weight="bold" filter="url(#bright-glow)">=</text>
    <text x="240" y="120" fill="#f59e0b" font-family="Arial, sans-serif" font-size="18" font-weight="bold" filter="url(#bright-glow)">π</text>
  </g>
  
  <!-- Title section with dramatic depth -->
  <rect x="10" y="140" width="300" height="35" fill="rgba(167,139,250,0.95)" rx="8" filter="url(#deep-shadow)"/>
  <rect x="15" y="145" width="290" height="25" fill="rgba(251,191,36,0.8)" rx="6"/>
  <text x="160" y="158" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold" filter="url(#bright-glow)">Lesson 3</text>
  <text x="160" y="176" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="12" font-weight="600">Proof Using Squares</text>
</svg>
