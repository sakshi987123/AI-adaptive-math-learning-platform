<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-slow5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="formula-slow5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="soft-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Very soft background -->
  <rect width="320" height="180" fill="url(#bg-slow5)"/>
  
  <!-- Gentle dots -->
  <pattern id="gentle-dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r="0.8" fill="rgba(251,191,36,0.05)"/>
  </pattern>
  <rect width="320" height="180" fill="url(#gentle-dots)"/>
  
  <!-- Simple rearrangement -->
  <g transform="translate(160, 85)" filter="url(#soft-shadow)">
    <!-- Original formula -->
    <rect x="-60" y="-15" width="120" height="25" fill="rgba(251,191,36,0.1)" rx="6"/>
    <text x="0" y="0" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="14" font-weight="500">a² + b² = c²</text>
    
    <!-- Arrow -->
    <path d="M 0,20 L 0,35" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" filter="url(#soft-glow)"/>
    <path d="M -5,30 L 5,30" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" filter="url(#soft-glow)"/>
    
    <!-- Rearranged formula -->
    <rect x="-60" y="5" width="120" height="25" fill="rgba(251,191,36,0.2)" rx="6"/>
    <text x="0" y="20" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="600">a² = c² - b²</text>
  </g>
  
  <!-- Title section -->
  <rect x="10" y="140" width="300" height="30" fill="rgba(251,191,36,0.15)" rx="8"/>
  <text x="160" y="158" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="600">Lesson 5</text>
  <text x="160" y="172" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="10">Finding Missing Side</text>
</svg>
