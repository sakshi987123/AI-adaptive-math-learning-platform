<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="320" height="180" fill="url(#bg3)"/>
  
  <!-- Speed lines background -->
  <g opacity="0.2">
    <line x1="50" y1="40" x2="270" y2="40" stroke="white" stroke-width="1"/>
    <line x1="60" y1="60" x2="280" y2="60" stroke="white" stroke-width="1"/>
    <line x1="70" y1="80" x2="290" y2="80" stroke="white" stroke-width="1"/>
  </g>
  
  <!-- Lightning bolt for speed -->
  <g transform="translate(160, 85)" filter="url(#glow3)">
    <path d="M 0,-35 L -8,-15 L -3,-15 L -5,0 L 2,0 L -2,15 L 3,15 L 0,35" 
          fill="#ffeb3b" stroke="white" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="0" cy="0" r="25" fill="none" stroke="white" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="0" y="5" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">√</text>
  </g>
  
  <!-- Title section -->
  <rect x="10" y="140" width="300" height="30" fill="rgba(0,0,0,0.3)" rx="8"/>
  <text x="160" y="158" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Lesson 3</text>
  <text x="160" y="172" text-anchor="middle" fill="#ffeb3b" font-family="Arial, sans-serif" font-size="10">Fast Problem Solving</text>
</svg>
