<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-slow4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6ee7b7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="calc-slow4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="soft-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Soft background -->
  <rect width="320" height="180" fill="url(#bg-slow4)"/>
  
  <!-- Wave pattern -->
  <pattern id="wave-pattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 0,20 Q 10,10 20,20 T 40,20" fill="none" stroke="rgba(251,191,36,0.08)" stroke-width="1"/>
  </pattern>
  <rect width="320" height="180" fill="url(#wave-pattern)"/>
  
  <!-- Simple triangle with calculator -->
  <g transform="translate(160, 85)" filter="url(#soft-shadow)">
    <polygon points="-35,-20 -35,25 35,25" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Calculator box -->
    <rect x="-15" y="-10" width="30" height="20" fill="url(#calc-slow4)" rx="4" filter="url(#soft-glow)"/>
    <text x="0" y="5" text-anchor="middle" fill="#6ee7b7" font-family="Arial, sans-serif" font-size="12" font-weight="600">√</text>
    
    <!-- Simple labels -->
    <text x="-35" y="-25" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="600">a</text>
    <text x="-35" y="40" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="600">b</text>
    <text x="35" y="25" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="600">c</text>
  </g>
  
  <!-- Title section -->
  <rect x="10" y="140" width="300" height="30" fill="rgba(251,191,36,0.15)" rx="8"/>
  <text x="160" y="158" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="600">Lesson 4</text>
  <text x="160" y="172" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="10">Finding Hypotenuse</text>
</svg>
