<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="320" height="180" fill="url(#grad3)"/>
  
  <!-- Speed visualization -->
  <g transform="translate(160, 90)">
    <circle cx="0" cy="0" r="35" fill="none" stroke="white" stroke-width="3" opacity="0.9"/>
    <text x="0" y="-50" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">c = √(a² + b²)</text>
    <path d="M -20,-20 L 20,20" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <path d="M -25,-25 L 15,25" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  </g>
  
  <!-- Title -->
  <text x="160" y="160" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Lesson 3</text>
  <text x="160" y="175" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">Fast Problem Solving</text>
</svg>
