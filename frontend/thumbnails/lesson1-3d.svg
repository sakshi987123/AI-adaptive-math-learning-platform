<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1-3d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tri1-3d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow-3d">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity="0.4"/>
    </filter>
    <filter id="glow-3d">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background with depth -->
  <rect width="320" height="180" fill="url(#bg1-3d)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid-3d" x="0" y="0" width="25" height="25" patternUnits="userSpaceOnUse">
    <path d="M 25 0 L 0 0 0 25" fill="none" stroke="rgba(52,211,153,0.1)" stroke-width="0.5"/>
  </pattern>
  <rect width="320" height="180" fill="url(#grid-3d)"/>
  
  <!-- 3D Triangle -->
  <g transform="translate(160, 85)" filter="url(#shadow-3d)">
    <!-- Back face -->
    <polygon points="-45,-20 -55,25 55,25" fill="rgba(16,185,129,0.3)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
    <!-- Bottom face -->
    <polygon points="-55,25 55,25 55,35 -45,35" fill="rgba(16,185,129,0.4)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
    <!-- Front face -->
    <polygon points="-45,-20 -55,25 55,25" fill="url(#tri1-3d)" stroke="rgba(52,211,153,0.8)" stroke-width="2" filter="url(#glow-3d)"/>
    
    <!-- Right angle indicator -->
    <path d="M -55,15 L -35,15 L -35,25" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Labels with 3D effect -->
    <text x="-45" y="-30" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold" filter="url(#glow-3d)">a</text>
    <text x="-45" y="50" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold" filter="url(#glow-3d)">b</text>
    <text x="0" y="15" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="16" font-weight="bold" filter="url(#glow-3d)">c</text>
  </g>
  
  <!-- Floating elements -->
  <g opacity="0.6">
    <circle cx="60" cy="40" r="2" fill="#34d399"/>
    <circle cx="260" cy="60" r="2" fill="#34d399"/>
    <circle cx="80" cy="130" r="2" fill="#34d399"/>
    <circle cx="240" cy="120" r="2" fill="#34d399"/>
  </g>
  
  <!-- Title section with 3D effect -->
  <rect x="10" y="140" width="300" height="35" fill="rgba(15,23,42,0.9)" rx="8" filter="url(#shadow-3d)"/>
  <text x="160" y="158" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="20" font-weight="bold">Lesson 1</text>
  <text x="160" y="174" text-anchor="middle" fill="#34d399" font-family="Arial, sans-serif" font-size="11">Right Triangle</text>
</svg>
