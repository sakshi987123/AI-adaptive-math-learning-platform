<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="320" height="180" fill="url(#bg4)"/>
  
  <!-- Rearrangement arrows -->
  <g opacity="0.3">
    <path d="M 40,50 L 80,50" stroke="white" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M 240,50 L 280,50" stroke="white" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  
  <!-- Formula boxes -->
  <g transform="translate(160, 85)" filter="url(#glow4)">
    <rect x="-80" y="-30" width="60" height="25" fill="none" stroke="white" stroke-width="2" rx="5"/>
    <text x="-50" y="-12" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12">a² + b²</text>
    
    <path d="M -20,-17 L 20,-17" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round"/>
    <text x="0" y="-22" text-anchor="middle" fill="#ff6b6b" font-family="Arial, sans-serif" font-size="10">=</text>
    
    <rect x="20" y="-30" width="60" height="25" fill="none" stroke="white" stroke-width="2" rx="5"/>
    <text x="50" y="-12" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12">c²</text>
    
    <text x="0" y="10" text-anchor="middle" fill="#ff6b6b" font-family="Arial, sans-serif" font-size="11">Rearrange</text>
  </g>
  
  <!-- Title section -->
  <rect x="10" y="140" width="300" height="30" fill="rgba(0,0,0,0.3)" rx="8"/>
  <text x="160" y="158" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Lesson 4</text>
  <text x="160" y="172" text-anchor="middle" fill="#ff6b6b" font-family="Arial, sans-serif" font-size="10">Missing Side</text>
</svg>
