<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-enhanced2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="formula-enhanced2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
    <filter id="deep-shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-opacity="0.6"/>
    </filter>
    <filter id="bright-glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="spotlight">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Dynamic background -->
  <rect width="320" height="180" fill="url(#bg-enhanced2)"/>
  
  <!-- Spotlight effect -->
  <ellipse cx="160" cy="90" rx="100" ry="50" fill="url(#spotlight)" opacity="0.7"/>
  
  <!-- Geometric pattern -->
  <pattern id="geo-pattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <polygon points="20,10 30,10 25,20 15,10" fill="none" stroke="rgba(251,191,36,0.1)" stroke-width="0.5"/>
    <circle cx="20" cy="20" r="2" fill="rgba(251,191,36,0.1)"/>
    <circle cx="30" cy="30" r="2" fill="rgba(251,191,36,0.1)"/>
  </pattern>
  <rect width="320" height="180" fill="url(#geo-pattern)"/>
  
  <!-- Enhanced 3D Formula -->
  <g transform="translate(160, 85)" filter="url(#deep-shadow)">
    <!-- Back layers -->
    <rect x="-70" y="-25" width="140" height="50" fill="rgba(251,191,36,0.2)" rx="12"/>
    <rect x="-65" y="-20" width="130" height="40" fill="rgba(251,191,36,0.3)" rx="10"/>
    
    <!-- Main formula box -->
    <rect x="-60" y="-15" width="120" height="30" fill="url(#formula-enhanced2)" rx="8" filter="url(#bright-glow)"/>
    
    <!-- Mathematical symbols -->
    <text x="0" y="0" text-anchor="middle" fill="#7c2d12" font-family="Arial, sans-serif" font-size="18" font-weight="bold" filter="url(#bright-glow)">a² + b² = c²</text>
    <text x="0" y="18" text-anchor="middle" fill="#7c2d12" font-family="Arial, sans-serif" font-size="11" font-weight="600">Pythagoras Theorem</text>
  </g>
  
  <!-- Floating mathematical elements -->
  <g opacity="0.9">
    <text x="50" y="40" fill="#f59e0b" font-family="Arial, sans-serif" font-size="18" font-weight="bold" filter="url(#bright-glow)">π</text>
    <text x="270" y="60" fill="#f59e0b" font-family="Arial, sans-serif" font-size="16" font-weight="bold" filter="url(#bright-glow)">√</text>
    <text x="80" y="130" fill="#f59e0b" font-family="Arial, sans-serif" font-size="14" font-weight="bold" filter="url(#bright-glow)">α</text>
    <text x="240" y="110" fill="#f59e0b" font-family="Arial, sans-serif" font-size="14" font-weight="bold" filter="url(#bright-glow)">β</text>
  </g>
  
  <!-- Title section with enhanced depth -->
  <rect x="10" y="140" width="300" height="35" fill="rgba(251,191,36,0.9)" rx="8" filter="url(#deep-shadow)"/>
  <rect x="15" y="145" width="290" height="25" fill="rgba(251,191,36,0.7)" rx="6"/>
  <text x="160" y="158" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="22" font-weight="bold" filter="url(#bright-glow)">Lesson 2</text>
  <text x="160" y="176" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="12" font-weight="600">Introduction to Pythagoras</text>
</svg>
