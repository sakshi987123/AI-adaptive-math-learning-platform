<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="320" height="180" fill="url(#bg1)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  </pattern>
  <rect width="320" height="180" fill="url(#grid)"/>
  
  <!-- Main triangle -->
  <g transform="translate(160, 85)" filter="url(#glow)">
    <polygon points="-50,-30 -50,30 50,30" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right angle indicator -->
    <path d="M -50,20 L -30,20 L -30,30" fill="none" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/>
    <!-- Labels -->
    <text x="-50" y="-40" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">a</text>
    <text x="-50" y="45" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">b</text>
    <text x="0" y="10" text-anchor="middle" fill="#ffd700" font-family="Arial, sans-serif" font-size="14" font-weight="bold">c</text>
  </g>
  
  <!-- Title section -->
  <rect x="10" y="140" width="300" height="30" fill="rgba(0,0,0,0.3)" rx="8"/>
  <text x="160" y="158" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Lesson 1</text>
  <text x="160" y="172" text-anchor="middle" fill="#ffd700" font-family="Arial, sans-serif" font-size="10">Right Triangle Basics</text>
</svg>
