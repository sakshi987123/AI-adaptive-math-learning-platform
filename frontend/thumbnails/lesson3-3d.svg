<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3-3d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lightning-3d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow-3d">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-opacity="0.6"/>
    </filter>
    <filter id="glow-3d">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background with depth -->
  <rect width="320" height="180" fill="url(#bg3-3d)"/>
  
  <!-- Speed lines with motion blur -->
  <g opacity="0.3">
    <line x1="30" y1="35" x2="290" y2="35" stroke="white" stroke-width="2" filter="url(#blur)"/>
    <line x1="40" y1="55" x2="300" y2="55" stroke="white" stroke-width="1.5" filter="url(#blur)"/>
    <line x1="50" y1="75" x2="310" y2="75" stroke="white" stroke-width="1" filter="url(#blur)"/>
  </g>
  
  <!-- 3D Lightning bolt -->
  <g transform="translate(160, 85)" filter="url(#shadow-3d)">
    <!-- Back layer -->
    <path d="M 0,-40 L -10,-15 L -4,-15 L -6,0 L 2,0 L -4,20 L 5,20 L 0,45" 
          fill="rgba(251,191,36,0.3)" stroke="rgba(251,191,36,0.2)" stroke-width="3" stroke-linejoin="round"/>
    
    <!-- Front layer -->
    <path d="M 0,-40 L -10,-15 L -4,-15 L -6,0 L 2,0 L -4,20 L 5,20 L 0,45" 
          fill="url(#lightning-3d)" stroke="white" stroke-width="2" stroke-linejoin="round" filter="url(#glow-3d)"/>
    
    <!-- Energy rings -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="white" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.8"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="white" stroke-width="1" stroke-dasharray="4,6" opacity="0.5"/>
    
    <!-- Speed indicator -->
    <text x="0" y="8" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold" filter="url(#glow-3d)">⚡</text>
  </g>
  
  <!-- Floating speed particles -->
  <g opacity="0.8">
    <circle cx="60" cy="40" r="3" fill="#fbbf24" filter="url(#glow-3d)"/>
    <circle cx="260" cy="65" r="2.5" fill="#f59e0b" filter="url(#glow-3d)"/>
    <circle cx="100" cy="125" r="2" fill="#fbbf24" filter="url(#glow-3d)"/>
    <circle cx="220" cy="110" r="3" fill="#f59e0b" filter="url(#glow-3d)"/>
  </g>
  
  <!-- Title section with 3D effect -->
  <rect x="10" y="140" width="300" height="35" fill="rgba(59,130,246,0.9)" rx="8" filter="url(#shadow-3d)"/>
  <rect x="15" y="145" width="290" height="25" fill="rgba(37,99,235,0.8)" rx="6"/>
  <text x="160" y="160" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="20" font-weight="bold" filter="url(#glow-3d)">Lesson 3</text>
  <text x="160" y="175" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="11" font-weight="600">Fast Problem Solving</text>
</svg>
