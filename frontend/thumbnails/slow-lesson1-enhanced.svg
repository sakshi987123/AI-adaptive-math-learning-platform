<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-enhanced1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tri-enhanced1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <filter id="deep-shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.5"/>
    </filter>
    <filter id="bright-glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="spotlight">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Dynamic background -->
  <rect width="320" height="180" fill="url(#bg-enhanced1)"/>
  
  <!-- Spotlight effect -->
  <ellipse cx="160" cy="90" rx="80" ry="40" fill="url(#spotlight)" opacity="0.6"/>
  
  <!-- Animated grid pattern -->
  <pattern id="dynamic-grid" x="0" y="0" width="35" height="35" patternUnits="userSpaceOnUse">
    <circle cx="17.5" cy="17.5" r="1" fill="rgba(52,211,153,0.15)"/>
    <path d="M 0,17.5 L 35,17.5 M 17.5,0 L 17.5,35" stroke="rgba(52,211,153,0.1)" stroke-width="0.5"/>
  </pattern>
  <rect width="320" height="180" fill="url(#dynamic-grid)"/>
  
  <!-- Enhanced 3D Triangle -->
  <g transform="translate(160, 85)" filter="url(#deep-shadow)">
    <!-- Back layers -->
    <polygon points="-50,-30 -60,40 60,40" fill="rgba(16,185,129,0.2)" stroke="rgba(16,185,129,0.3)" stroke-width="1.5"/>
    <polygon points="-50,-30 -60,40 60,40" fill="rgba(16,185,129,0.3)" stroke="rgba(16,185,129,0.4)" stroke-width="1"/>
    
    <!-- Main triangle -->
    <polygon points="-50,-30 -60,40 60,40" fill="url(#tri-enhanced1)" stroke="rgba(52,211,153,0.8)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#bright-glow)"/>
    
    <!-- Right angle indicator with glow -->
    <path d="M -60,20 L -40,20 L -40,30" fill="none" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" filter="url(#bright-glow)"/>
    <circle cx="-40" cy="25" r="4" fill="#fbbf24" filter="url(#bright-glow)"/>
    
    <!-- Enhanced labels -->
    <text x="-50" y="-40" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold" filter="url(#bright-glow)">a</text>
    <text x="-50" y="50" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold" filter="url(#bright-glow)">b</text>
    <text x="0" y="15" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="20" font-weight="bold" filter="url(#bright-glow)">c</text>
  </g>
  
  <!-- Floating particles -->
  <g opacity="0.8">
    <circle cx="50" cy="40" r="3" fill="#34d399" filter="url(#bright-glow)"/>
    <circle cx="270" cy="60" r="2.5" fill="#34d399" filter="url(#bright-glow)"/>
    <circle cx="80" cy="130" r="3" fill="#34d399" filter="url(#bright-glow)"/>
    <circle cx="240" cy="120" r="2.5" fill="#34d399" filter="url(#bright-glow)"/>
    <circle cx="100" cy="50" r="2" fill="#34d399" filter="url(#bright-glow)"/>
  </g>
  
  <!-- Title section with enhanced depth -->
  <rect x="10" y="140" width="300" height="35" fill="rgba(15,23,42,0.9)" rx="8" filter="url(#deep-shadow)"/>
  <rect x="15" y="145" width="290" height="25" fill="rgba(16,185,129,0.8)" rx="6"/>
  <text x="160" y="158" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="22" font-weight="bold" filter="url(#bright-glow)">Lesson 1</text>
  <text x="160" y="175" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="12" font-weight="600">Right Triangle Basics</text>
</svg>
