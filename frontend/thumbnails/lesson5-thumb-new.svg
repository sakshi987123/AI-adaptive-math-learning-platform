<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#92fe9d;stop-opacity:1" />
    </linearGradient>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="320" height="180" fill="url(#bg5)"/>
  
  <!-- World map pattern -->
  <g opacity="0.2">
    <circle cx="60" cy="40" r="3" fill="white"/>
    <circle cx="260" cy="60" r="3" fill="white"/>
    <circle cx="100" cy="120" r="3" fill="white"/>
    <circle cx="220" cy="100" r="3" fill="white"/>
    <line x1="60" y1="40" x2="260" y2="60" stroke="white" stroke-width="1"/>
    <line x1="260" y1="60" x2="100" y2="120" stroke="white" stroke-width="1"/>
    <line x1="100" y1="120" x2="220" y2="100" stroke="white" stroke-width="1"/>
  </g>
  
  <!-- Real world icons -->
  <g transform="translate(160, 85)" filter="url(#glow5)">
    <!-- Building icon -->
    <rect x="-70" y="-20" width="25" height="30" fill="white" opacity="0.8" rx="2"/>
    <polygon points="-70,-20 -57.5,-35 -57.5,-20" fill="#ff6b6b" opacity="0.8"/>
    
    <!-- Navigation compass -->
    <circle cx="0" cy="-10" r="20" fill="none" stroke="white" stroke-width="2"/>
    <path d="M 0,-25 L 0,5" stroke="white" stroke-width="3"/>
    <path d="M -5,-30 L 0,-25 L 5,-30 Z" fill="white"/>
    
    <!-- Calculator -->
    <rect x="45" y="-15" width="25" height="20" fill="white" opacity="0.8" rx="3"/>
    <rect x="48" y="-12" width="19" height="12" fill="#333" rx="1"/>
    <text x="57.5" y="-3" text-anchor="middle" fill="#00ff00" font-family="monospace" font-size="8">√</text>
  </g>
  
  <!-- Title section -->
  <rect x="10" y="140" width="300" height="30" fill="rgba(0,0,0,0.3)" rx="8"/>
  <text x="160" y="158" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Lesson 5</text>
  <text x="160" y="172" text-anchor="middle" fill="#00ff88" font-family="Arial, sans-serif" font-size="10">Real World Applications</text>
</svg>
