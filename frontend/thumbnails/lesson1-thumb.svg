<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="320" height="180" fill="url(#grad1)"/>
  
  <!-- Triangle visualization -->
  <g transform="translate(160, 90)">
    <polygon points="-60,-40 -60,40 60,40" fill="none" stroke="white" stroke-width="3" opacity="0.9"/>
    <circle cx="-60" cy="-40" r="4" fill="white"/>
    <circle cx="-60" cy="40" r="4" fill="white"/>
    <circle cx="60" cy="40" r="4" fill="white"/>
    <text x="0" y="-50" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">a²</text>
    <text x="-80" y="45" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">b²</text>
    <text x="0" y="60" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">c²</text>
  </g>
  
  <!-- Title -->
  <text x="160" y="160" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Lesson 1</text>
  <text x="160" y="175" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">Right Triangle</text>
</svg>
