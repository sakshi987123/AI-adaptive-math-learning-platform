<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="320" height="180" fill="url(#grad2)"/>
  
  <!-- Formula visualization -->
  <g transform="translate(160, 90)">
    <rect x="-80" y="-30" width="160" height="60" fill="none" stroke="white" stroke-width="2" rx="8" opacity="0.9"/>
    <text x="0" y="-5" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">a² + b² = c²</text>
    <text x="0" y="15" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12">Pythagoras</text>
  </g>
  
  <!-- Title -->
  <text x="160" y="160" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Lesson 2</text>
  <text x="160" y="175" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">Formula</text>
</svg>
