<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-slow6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4c1d95;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="complete-slow6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="soft-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Very gentle background -->
  <rect width="320" height="180" fill="url(#bg-slow6)"/>
  
  <!-- Very subtle pattern -->
  <pattern id="very-soft" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
    <circle cx="25" cy="25" r="0.5" fill="rgba(251,191,36,0.03)"/>
  </pattern>
  <rect width="320" height="180" fill="url(#very-soft)"/>
  
  <!-- Simple summary elements -->
  <g transform="translate(160, 85)" filter="url(#soft-shadow)">
    <!-- Circle container -->
    <circle cx="0" cy="0" r="45" fill="rgba(251,191,36,0.1)" stroke="rgba(251,191,36,0.3)" stroke-width="2"/>
    
    <!-- Simple checkmark -->
    <path d="M -20,0 L -8,12 L 8,12 L 20,-8" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft-glow)"/>
    
    <!-- Simple text -->
    <text x="0" y="-5" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="600">COMPLETE</text>
    <text x="0" y="12" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11" font-weight="500">All Lessons</text>
  </g>
  
  <!-- Title section -->
  <rect x="10" y="140" width="300" height="30" fill="rgba(251,191,36,0.15)" rx="8"/>
  <text x="160" y="158" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="600">Lesson 6</text>
  <text x="160" y="172" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="10">Complete Revision</text>
</svg>
