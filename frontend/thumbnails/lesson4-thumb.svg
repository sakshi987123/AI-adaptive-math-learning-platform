<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="320" height="180" fill="url(#grad4)"/>
  
  <!-- Rearrangement visualization -->
  <g transform="translate(160, 90)">
    <rect x="-70" y="-25" width="140" height="50" fill="none" stroke="white" stroke-width="2" rx="6" opacity="0.9"/>
    <text x="0" y="-5" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">a = √(c² - b²)</text>
    <text x="0" y="15" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">Find Missing Side</text>
  </g>
  
  <!-- Title -->
  <text x="160" y="160" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Lesson 4</text>
