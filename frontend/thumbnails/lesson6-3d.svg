<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg6-3d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="complete-3d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow-3d">
      <feDropShadow dx="0" dy="20" stdDeviation="25" flood-opacity="0.9"/>
    </filter>
    <filter id="glow-3d">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background with deep depth -->
  <rect width="320" height="180" fill="url(#bg6-3d)"/>
  
  <!-- Star burst background -->
  <g transform="translate(160, 85)" opacity="0.3">
    <path d="M 0,-50 L 15,-35 L 25,-40 L 20,-20 L 40,-15 L 25,-5 L 30,0 L 15,5 L 20,25 L 0,20 L -20,25 L -15,5 L -30,0 L -25,-5 L -40,-15 L -25,-20 L -15,-35 Z" 
          fill="rgba(16,185,129,0.2)" stroke="rgba(16,185,129,0.4)" stroke-width="1"/>
  </g>
  
  <!-- 3D Complete Badge -->
  <g transform="translate(160, 85)" filter="url(#shadow-3d)">
    <!-- Back layer -->
    <circle cx="0" cy="0" r="50" fill="rgba(16,185,129,0.2)" stroke="rgba(16,185,129,0.4)" stroke-width="2"/>
    
    <!-- Middle layer -->
    <circle cx="0" cy="0" r="45" fill="url(#complete-3d)" stroke="rgba(52,211,153,0.6)" stroke-width="2"/>
    
    <!-- Front layer -->
    <circle cx="0" cy="0" r="40" fill="none" stroke="white" stroke-width="3" filter="url(#glow-3d)"/>
    
    <!-- Check mark -->
    <path d="M -20,0 L -8,12 L 20,-16" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-3d)"/>
    
    <!-- Complete text -->
    <text x="0" y="-5" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold" filter="url(#glow-3d)">COMPLETE</text>
    <text x="0" y="12" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11" font-weight="600">SUMMARY</text>
  </g>
  
  <!-- Floating completion particles -->
  <g opacity="0.8">
    <circle cx="60" cy="40" r="3" fill="#34d399" filter="url(#glow-3d)"/>
    <circle cx="260" cy="65" r="2.5" fill="#34d399" filter="url(#glow-3d)"/>
    <circle cx="80" cy="135" r="3.5" fill="#34d399" filter="url(#glow-3d)"/>
    <circle cx="240" cy="125" r="2.5" fill="#34d399" filter="url(#glow-3d)"/>
    <circle cx="100" cy="50" r="2" fill="#34d399" filter="url(#glow-3d)"/>
    <circle cx="220" cy="140" r="3" fill="#34d399" filter="url(#glow-3d)"/>
  </g>
  
  <!-- Title section with 3D effect -->
  <rect x="10" y="140" width="300" height="35" fill="rgba(16,185,129,0.95)" rx="8" filter="url(#shadow-3d)"/>
  <rect x="15" y="145" width="290" height="25" fill="rgba(5,150,105,0.9)" rx="6"/>
  <text x="160" y="160" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="22" font-weight="bold" filter="url(#glow-3d)">Lesson 6</text>
  <text x="160" y="176" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="600">Complete Summary</text>
</svg>
